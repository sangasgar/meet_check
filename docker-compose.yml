services:
  postgres:
    image: postgres:17-alpine
    container_name: meet_startap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meet_startap
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d meet_startap']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
